name: Publish container

# Builds the Docker image and publishes it to GitHub Container Registry (ghcr.io).
#
# Images are pushed to: ghcr.io/<owner>/graph-indexer-mcp
#   - push to `master`        -> tags `latest` + `master` + `sha-<short>`
#   - push a tag `vX.Y.Z`     -> tags `X.Y.Z`, `X.Y`, `X` + `sha-<short>`
#   - manual run (dispatch)   -> tags for the ref it runs on
#
# No secrets to configure: the built-in `GITHUB_TOKEN` authenticates to ghcr.io.
# The published package inherits the repo's visibility; make it public (or grant
# pull access) under the repo's Packages settings if external pulls are needed.

on:
  push:
    branches: [master]
    tags: ['v*.*.*']
  workflow_dispatch:

# Cancel an in-progress run for the same ref when a new commit arrives.
concurrency:
  group: publish-container-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Gate publishing on a green typecheck + test run so we never ship a broken image.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # required to push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      # Derive image tags + OCI labels from the git ref.
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            # `latest` only for the default branch (master).
            type=raw,value=latest,enable={{is_default_branch}}

      # Uncomment to also build linux/arm64 (slower — emulated via QEMU).
      # - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64 # add ,linux/arm64 with the QEMU step above
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Skip the provenance attestation so the package listing stays a single
          # clean manifest (no "unknown/unknown" arch entry). Set to true (and add
          # `id-token: write` + `attestations: write` perms) if you want SLSA provenance.
          provenance: false
