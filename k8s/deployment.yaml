# =============================================================================
# graph-indexer-mcp Deployment
#
# Deployment model note: the MCP server speaks the stdio transport — there is
# no HTTP listener to load-balance. The pod runs the binary idle (well, the
# entrypoint validates env then exec's `node dist/index.js`, which blocks on
# stdin); operators connect by attaching to it. The canonical pattern is:
#
#     kubectl -n graph-indexer-mcp exec -it deploy/graph-indexer-mcp -- \
#         node dist/index.js
#
# That spawns a SECOND short-lived MCP process inside the running pod for the
# duration of the client's session. The "main" PID-1 process exists mostly to
# keep the pod alive, hold the SA token mount, and surface a single point of
# config. Hence replicas: 1 — horizontal scaling does not buy us anything for
# stdio MCP.
#
# Alternative: switch replicas to 0 and use `kubectl run --rm -it` against the
# image directly. The Deployment form is friendlier for operators who prefer
# `kubectl exec` over `kubectl run`.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: graph-indexer-mcp
  namespace: graph-indexer-mcp
  labels:
    app.kubernetes.io/name: graph-indexer-mcp
    app.kubernetes.io/component: mcp-server
spec:
  replicas: 1
  strategy:
    # Recreate, not RollingUpdate — there is no second replica to drain to
    # and config changes should produce a clean restart.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: graph-indexer-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: graph-indexer-mcp
        app.kubernetes.io/component: mcp-server
    spec:
      serviceAccountName: graph-indexer-mcp
      # Pod opts into SA token mount so kubectl can authenticate from inside.
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mcp
          image: ghcr.io/graphprotocol/graph-indexer-mcp:0.1.0  # pin per release
          imagePullPolicy: IfNotPresent
          # Keep stdin open so `kubectl exec -i` connections can talk JSON-RPC.
          stdin: true
          tty: false
          envFrom:
            - configMapRef:
                name: graph-indexer-mcp-config
            - secretRef:
                name: graph-indexer-mcp-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            # Writable scratch for node / kubectl temp files.
            - name: tmp
              mountPath: /tmp
            - name: home
              mountPath: /home/mcp
          # MCP stdio = no HTTP probe target. Liveness = the node process is
          # still up; readiness = the same (there is no "ready to serve HTTP"
          # state). pgrep is busybox-provided on alpine.
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "pgrep -f 'node dist/index.js' >/dev/null"]
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "pgrep -f 'node dist/index.js' >/dev/null"]
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
        - name: home
          emptyDir:
            sizeLimit: 16Mi
      terminationGracePeriodSeconds: 15
