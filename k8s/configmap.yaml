# Non-secret configuration. Sensitive values (auth tokens, postgres URLs,
# gateway URLs containing API keys) live in secret.yaml.example -> Secret.
# Anything that you would not mind committing to version control belongs here.
apiVersion: v1
kind: ConfigMap
metadata:
  name: graph-indexer-mcp-config
  namespace: graph-indexer-mcp
  labels:
    app.kubernetes.io/name: graph-indexer-mcp
data:
  # --- Indexer identity ---
  INDEXER_ADDRESS: "0x0000000000000000000000000000000000000000"
  # Protocol network the indexer-agent submits actions against. Required
  # by the agent's ActionInput GraphQL type post-Horizon migration.
  PROTOCOL_NETWORK: "arbitrum-one"

  # --- Internal-cluster data source endpoints ---
  # NOTE: Gateway URLs that embed API keys (NETWORK_SUBGRAPH_URL,
  # EBO_SUBGRAPH_URL, QOS_SUBGRAPH_URL) live in the Secret, NOT here, because
  # the path segment /api/<KEY>/ is secret material. If you self-host these
  # subgraphs with no key in the URL, you can move them back into this
  # ConfigMap — keys provided via envFrom are last-write-wins, so duplicating
  # a key in both ConfigMap and Secret is undefined behavior; pick one.
  GRAPH_NODE_STATUS_URL: "http://graph-node-query.graph-node.svc.cluster.local:8030/graphql"
  INDEXER_AGENT_URL: "http://indexer-agent.indexer-agent.svc.cluster.local:18000/graphql"
  GRAPHMAN_API_URL: "http://graph-node-query.graph-node.svc.cluster.local:8050"

  # --- Graphman CLI fallback (kubectl exec) ---
  # Namespace where graph-node pods live (NOT necessarily the MCP namespace).
  GRAPHMAN_KUBECTL_NAMESPACE: "graph-node"
  GRAPHMAN_POD_LABEL: "app=graph-node"
  GRAPHMAN_CONFIG_PATH: "/etc/graph-node/config.toml"

  # --- Access control ---
  # read_only | read_write | read_write_destructive | full
  ACCESS_LEVEL: "read_write"
  ACCESS_OVERRIDES_ALLOW: ""
  ACCESS_OVERRIDES_DENY: "graphman_drop_deployment,graphman_rewind_deployment"

  # --- Transport + authorization (optional; stdio defaults shown commented) ---
  # These are unset here so the default stdio profile (deployment.yaml) keeps
  # behaving exactly as before. The HTTP profile (deployment-http.yaml) sets
  # MCP_TRANSPORT/MCP_AUTHZ via the pod's `env:` block, which overrides envFrom.
  # Uncomment + edit here only if you want every Deployment that consumes this
  # ConfigMap to flip to the HTTP / k8s-rbac profile.
  #
  # MCP_TRANSPORT: stdio | http              (default: stdio)
  # MCP_TRANSPORT: "stdio"
  #
  # MCP_AUTHZ: static | k8s-rbac             (default: static)
  #   k8s-rbac REQUIRES MCP_TRANSPORT=http (identity only exists over HTTP).
  # MCP_AUTHZ: "static"
  #
  # MCP_HTTP_PORT: listen port for the http transport (default: 8080)
  # MCP_HTTP_PORT: "8080"
  #
  # MCP_HTTP_HOST: bind address for the http transport (default: 0.0.0.0)
  # MCP_HTTP_HOST: "0.0.0.0"
  #
  # K8S_API_AUDIENCE: expected audience for caller projected SA tokens, passed
  #   to TokenReview. Leave unset to accept the apiserver default audience.
  # K8S_API_AUDIENCE: "graph-indexer-mcp"

  # --- Optimization parameters ---
  MAX_ALLOCATIONS: "15"
  MAX_ALLOCATION_PCT: "0.25"
  RISKY_DEPLOYMENT_CAP_PCT: "0.05"
  MIN_SIGNAL: "100"
  GAS_ESTIMATE_GRT: "0.3"
  MIN_REWARDS_GRT_28D: "10"

  # --- Lists (comma-separated deployment IPFS hashes) ---
  WHITELIST: ""
  BLACKLIST: ""
  FROZENLIST: ""
  RISKY_DEPLOYMENTS: ""
