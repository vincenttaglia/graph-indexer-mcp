# ServiceAccount the MCP pod runs as. It carries the pod identity used by the
# HTTP / k8s-rbac profile: the authorizer calls TokenReview/SubjectAccessReview
# with this SA's token, which must be bound to system:auth-delegator (see
# clusterrolebinding-auth-delegator.yaml).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: graph-indexer-mcp
  namespace: graph-indexer-mcp
  labels:
    app.kubernetes.io/name: graph-indexer-mcp
# We intentionally do NOT auto-mount the SA token by default at the SA level;
# the Deployment opts in (automountServiceAccountToken: true) so the k8s-rbac
# authorizer can authenticate to the apiserver from inside the pod. If you ever
# run a sidecar that should NOT see the token, flip that off at the pod spec level.
automountServiceAccountToken: false
