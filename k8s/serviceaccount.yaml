# ServiceAccount the MCP pod runs as. The associated Role (role.yaml) grants
# the minimum permissions needed for the graphman CLI fallback to work:
# list graph-node pods + open an exec session into them.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: graph-indexer-mcp
  namespace: graph-indexer-mcp
  labels:
    app.kubernetes.io/name: graph-indexer-mcp
# We intentionally do NOT auto-mount the SA token by default at the SA level;
# the Deployment opts in (automountServiceAccountToken: true) so kubectl in
# the pod can authenticate. If you ever run a sidecar that should NOT see the
# token, flip that off at the pod spec level.
automountServiceAccountToken: false
