# Binds the graph-indexer-mcp ServiceAccount to the Role that grants
# pods/exec on graph-node pods.
#
# If graph-node lives in a different namespace than the MCP, change this
# RoleBinding's namespace to the graph-node namespace (and apply role.yaml
# there too). The `subjects` block can still reference the MCP's SA in its
# own namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: graph-indexer-mcp-graphnode-exec
  namespace: graph-indexer-mcp
  labels:
    app.kubernetes.io/name: graph-indexer-mcp
subjects:
  - kind: ServiceAccount
    name: graph-indexer-mcp
    namespace: graph-indexer-mcp
roleRef:
  kind: Role
  name: graph-indexer-mcp-graphnode-exec
  apiGroup: rbac.authorization.k8s.io
